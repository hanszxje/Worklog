name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

# Cấp quyền cho GITHUB_TOKEN để thực hiện deploy GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh xung đột khi deploy nhiều commit cùng lúc
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sử dụng bash shell mặc định
defaults:
  run:
    shell: bash

jobs:
  # Job build trang web
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.134.3"
          extended: true

      - name: Build website
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Job deploy lên GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
